<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  body {
    width: 300px;
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #111827;
    background: #ffffff;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 4px 0;
    color: #111827;
  }
  .sub {
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  .field { flex: 1; }
  label {
    display: block;
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 4px;
    font-weight: 500;
  }
  input[type="text"] {
    width: 100%;
    padding: 7px 9px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
  }
  button {
    width: 100%;
    padding: 10px 12px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 6px;
    font-family: inherit;
    transition: background 0.1s;
  }
  .primary { background: #2563eb; color: white; }
  .primary:hover { background: #1d4ed8; }
  .secondary { background: #f3f4f6; color: #111827; border: 1px solid #e5e7eb; }
  .secondary:hover { background: #e5e7eb; }
  .status {
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 6px;
    margin-top: 10px;
    min-height: 16px;
    line-height: 1.4;
    display: none;
  }
  .status.show { display: block; }
  .status.success { background: #d1fae5; color: #065f46; }
  .status.error { background: #fee2e2; color: #991b1b; }
  .status.info { background: #dbeafe; color: #1e40af; }
  .hint {
    font-size: 10px;
    color: #9ca3af;
    margin-top: 10px;
    line-height: 1.45;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>Timesheet Autofill</h1>
  <div class="sub">Fills Break + lunch-In on rows where In&nbsp;&amp;&nbsp;Out are already set. Holidays / weekends stay untouched.</div>

  <div class="row">
    <div class="field">
      <label>Break start</label>
      <input type="text" id="breakStart" value="12" placeholder="12 or 12:00PM" />
    </div>
    <div class="field">
      <label>Break end</label>
      <input type="text" id="breakEnd" value="13" placeholder="13 or 1:00PM" />
    </div>
  </div>

  <button class="primary" id="fillBtn">Fill empty rows</button>
  <button class="secondary" id="fillSubmitBtn">Fill &amp; Submit</button>

  <div class="status" id="status"></div>

  <div class="hint">Tip: enter just "12" / "13" or full "12:00:00PM" — both work.</div>

  <script src="popup.js"></script>
</body>
</html>
